<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FinTrack — Personal Finance Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --bg2: #161616; --bg3: #1a1a1a;
    --border: #222; --border2: #2a2a2a; --border3: #333;
    --text: #f0ece0; --muted: #888; --dim: #555;
    --orange: #f97316; --green: #22c55e; --red: #f43f5e;
    --cyan: #06b6d4; --yellow: #eab308;
    --green-bg: #14532d; --red-bg: #3f0a10;
    --green-text: #4ade80; --red-text: #fb7185;
  }
  body { font-family: 'DM Mono', 'Courier New', monospace; background: var(--bg); color: var(--text); min-height: 100vh; }
  
  /* HEADER */
  #header { background: var(--bg); border-bottom: 1px solid var(--border); padding: 20px 28px 0; }
  #header-top { display: flex; align-items: flex-end; gap: 16px; margin-bottom: 20px; }
  .logo { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-sub { font-size: 11px; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
  #month-wrap { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  #month-wrap label { font-size: 11px; color: var(--dim); }
  select, input { background: var(--bg3); border: 1px solid var(--border3); color: var(--text); padding: 8px 12px; font-family: inherit; font-size: 13px; border-radius: 6px; outline: none; }
  select:focus, input:focus { border-color: var(--orange); }
  
  /* TABS */
  #tabs { display: flex; }
  .tab { background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); padding: 10px 18px; font-family: inherit; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .tab.active { border-bottom-color: var(--orange); color: var(--orange); }
  .tab:hover:not(.active) { color: var(--text); }

  /* MAIN */
  #main { padding: 28px; max-width: 960px; margin: 0 auto; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* CARDS */
  .kpi-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 28px; }
  .kpi-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 20px 22px; }
  .kpi-label { font-size: 10px; letter-spacing: 2px; color: var(--dim); margin-bottom: 8px; }
  .kpi-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
  .kpi-income { color: var(--green); }
  .kpi-expense { color: var(--red); }
  .kpi-net-pos { color: var(--cyan); }
  .kpi-net-neg { color: var(--red); }

  /* CHARTS */
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  .chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .section-label { font-size: 11px; letter-spacing: 2px; color: var(--dim); margin-bottom: 16px; }
  canvas { max-height: 220px; }

  /* BUDGET STATUS */
  .budget-status-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .budget-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .budget-cat { width: 110px; font-size: 12px; color: #aaa; }
  .budget-bar-wrap { flex: 1; height: 6px; background: var(--border2); border-radius: 3px; overflow: hidden; }
  .budget-bar { height: 100%; border-radius: 3px; transition: width 0.5s; }
  .budget-nums { font-size: 11px; width: 150px; text-align: right; }

  /* TRANSACTIONS */
  .tx-table { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .tx-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .tx-row { display: flex; align-items: center; padding: 13px 20px; border-bottom: 1px solid #131313; }
  .tx-row:nth-child(even) { background: #131313; }
  .tx-row:last-child { border-bottom: none; }
  .tx-date { width: 95px; font-size: 11px; color: var(--dim); }
  .tx-badge { width: 85px; }
  .badge { font-size: 10px; padding: 3px 8px; border-radius: 3px; letter-spacing: 1px; }
  .badge-income { background: var(--green-bg); color: var(--green-text); }
  .badge-expense { background: var(--red-bg); color: var(--red-text); }
  .tx-desc { flex: 1; font-size: 13px; color: #ccc; }
  .tx-note { color: var(--dim); font-size: 11px; }
  .tx-amount { font-size: 15px; font-weight: 500; font-family: 'Syne', sans-serif; }
  .tx-amount-income { color: var(--green-text); }
  .tx-amount-expense { color: var(--red-text); }
  .empty { padding: 40px; text-align: center; color: #444; font-size: 13px; }

  /* FORM */
  .form-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 28px; max-width: 480px; }
  .form-grid { display: grid; gap: 16px; }
  .form-label { font-size: 11px; color: var(--dim); margin-bottom: 6px; letter-spacing: 1px; }
  .form-input { width: 100%; }
  .type-row { display: flex; gap: 8px; }
  .type-btn { flex: 1; padding: 10px; border: 1px solid var(--border3); background: var(--bg3); color: var(--muted);
    border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; transition: all 0.15s; }
  .type-btn.income.active { background: var(--green-bg); border-color: var(--green); color: var(--green-text); }
  .type-btn.expense.active { background: var(--red-bg); border-color: var(--red); color: var(--red-text); }
  .submit-btn { width: 100%; padding: 14px; border: none; border-radius: 6px; font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: 1px; transition: all 0.15s; }
  .submit-btn-orange { background: var(--orange); color: #000; }
  .submit-btn-cyan { background: var(--cyan); color: #000; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .success-msg { color: var(--green); font-size: 13px; text-align: center; margin-top: 8px; min-height: 20px; }

  /* BUDGETS */
  .budgets-grid { display: grid; gap: 20px; }
  .budget-list { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .budget-item { padding: 16px 20px; border-bottom: 1px solid #131313; }
  .budget-item:last-child { border-bottom: none; }
  .budget-item-top { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .budget-item-name { font-size: 13px; color: #ccc; }
  .budget-item-bar { height: 4px; background: var(--border2); border-radius: 2px; }
  .budget-item-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }

  /* EXPORT */
  .export-btn { background: var(--bg2); border: 1px solid var(--border3); color: var(--text); padding: 12px 20px;
    border-radius: 6px; font-family: inherit; font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
  .export-btn:hover { border-color: var(--orange); color: var(--orange); }

  @media (max-width: 600px) {
    .kpi-grid { grid-template-columns: 1fr; }
    .chart-grid { grid-template-columns: 1fr; }
    #main { padding: 16px; }
    #header { padding: 16px 16px 0; }
  }
</style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <div>
      <div class="logo">FINTRACK</div>
      <div class="logo-sub">Personal Finance Tracker</div>
    </div>
    <div id="month-wrap">
      <label>MONTH</label>
      <select id="monthSelect"></select>
    </div>
  </div>
  <div id="tabs">
    <button class="tab active" onclick="switchTab('dashboard')">📊 Dashboard</button>
    <button class="tab" onclick="switchTab('transactions')">💸 Transactions</button>
    <button class="tab" onclick="switchTab('add')">➕ Add</button>
    <button class="tab" onclick="switchTab('budgets')">🎯 Budgets</button>
  </div>
</div>

<div id="main">
  <!-- DASHBOARD -->
  <div id="panel-dashboard" class="panel active">
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">INCOME</div><div class="kpi-value kpi-income" id="kpi-income">$0.00</div></div>
      <div class="kpi-card"><div class="kpi-label">EXPENSES</div><div class="kpi-value kpi-expense" id="kpi-expense">$0.00</div></div>
      <div class="kpi-card"><div class="kpi-label">NET</div><div class="kpi-value" id="kpi-net">$0.00</div></div>
    </div>
    <div class="chart-grid">
      <div class="chart-card"><div class="section-label">EXPENSE BREAKDOWN</div><canvas id="pieChart"></canvas><div id="pieEmpty" class="empty" style="display:none">No expenses this month</div></div>
      <div class="chart-card"><div class="section-label">SPENDING BY CATEGORY</div><canvas id="barChart"></canvas><div id="barEmpty" class="empty" style="display:none">No data</div></div>
    </div>
    <div class="budget-status-card">
      <div class="section-label">BUDGET STATUS</div>
      <div id="budgetStatus"></div>
    </div>
  </div>

  <!-- TRANSACTIONS -->
  <div id="panel-transactions" class="panel">
    <div class="tx-table">
      <div class="tx-header">
        <span class="section-label" style="margin:0" id="txTitle">TRANSACTIONS</span>
        <span style="font-size:12px;color:var(--dim)" id="txCount">0 entries</span>
      </div>
      <div id="txList"></div>
    </div>
  </div>

  <!-- ADD -->
  <div id="panel-add" class="panel">
    <div class="form-card">
      <div class="section-label">NEW TRANSACTION</div>
      <div class="form-grid">
        <div>
          <div class="form-label">TYPE</div>
          <div class="type-row">
            <button class="type-btn expense active" id="btn-expense" onclick="setType('expense')">Expense</button>
            <button class="type-btn income" id="btn-income" onclick="setType('income')">Income</button>
          </div>
        </div>
        <div>
          <div class="form-label">CATEGORY</div>
          <select class="form-input" id="addCategory"></select>
        </div>
        <div>
          <div class="form-label">DATE</div>
          <input class="form-input" type="date" id="addDate"/>
        </div>
        <div>
          <div class="form-label">AMOUNT ($)</div>
          <input class="form-input" type="number" id="addAmount" placeholder="0.00" min="0.01" step="0.01"/>
        </div>
        <div>
          <div class="form-label">NOTE (OPTIONAL)</div>
          <input class="form-input" type="text" id="addNote" placeholder="What was this for?"/>
        </div>
        <button class="submit-btn submit-btn-orange" id="addBtn" onclick="addTransaction()">ADD TRANSACTION</button>
        <div class="success-msg" id="addSuccess"></div>
      </div>
    </div>
  </div>

  <!-- BUDGETS -->
  <div id="panel-budgets" class="panel">
    <div class="budgets-grid">
      <div class="form-card">
        <div class="section-label">SET BUDGET</div>
        <div class="form-grid">
          <div>
            <div class="form-label">CATEGORY</div>
            <select class="form-input" id="budgetCategory"></select>
          </div>
          <div>
            <div class="form-label">MONTHLY BUDGET ($)</div>
            <input class="form-input" type="number" id="budgetAmount" placeholder="e.g. 500" min="1"/>
          </div>
          <button class="submit-btn submit-btn-cyan" onclick="setBudget()">SET BUDGET</button>
          <div class="success-msg" id="budgetSuccess"></div>
        </div>
      </div>
      <div class="budget-list" id="budgetList">
        <div class="tx-header"><span class="section-label" style="margin:0">CURRENT BUDGETS</span></div>
        <div id="budgetItems"></div>
      </div>
    </div>
    <div style="margin-top:20px">
      <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
  </div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────
const COLORS = ["#f97316","#eab308","#22c55e","#06b6d4","#a855f7","#ec4899","#f43f5e","#84cc16"];

let state = JSON.parse(localStorage.getItem('fintrack') || 'null') || {
  transactions: [
    { date:"2026-03-01", type:"income",  category:"Salary",        amount:4200, note:"March paycheck" },
    { date:"2026-03-03", type:"expense", category:"Rent",          amount:1400, note:"" },
    { date:"2026-03-05", type:"expense", category:"Food",          amount:220,  note:"Groceries" },
    { date:"2026-03-07", type:"expense", category:"Transport",     amount:85,   note:"Bus pass" },
    { date:"2026-03-10", type:"income",  category:"Freelance",     amount:650,  note:"Design project" },
    { date:"2026-03-12", type:"expense", category:"Food",          amount:140,  note:"Restaurants" },
    { date:"2026-03-15", type:"expense", category:"Utilities",     amount:110,  note:"Electric + internet" },
    { date:"2026-03-18", type:"expense", category:"Entertainment", amount:60,   note:"Streaming + movies" },
    { date:"2026-02-01", type:"income",  category:"Salary",        amount:4200, note:"Feb paycheck" },
    { date:"2026-02-03", type:"expense", category:"Rent",          amount:1400, note:"" },
    { date:"2026-02-10", type:"expense", category:"Food",          amount:310,  note:"" },
    { date:"2026-02-14", type:"expense", category:"Entertainment", amount:120,  note:"Valentine's day" },
  ],
  budgets: { Food:400, Entertainment:80, Transport:100, Utilities:150 },
  categories: {
    income:  ["Salary","Freelance","Gift","Other"],
    expense: ["Rent","Food","Transport","Utilities","Entertainment","Health","Shopping","Other"]
  }
};

let currentMonth = "2026-03";
let addType = "expense";
let pieChartInst = null, barChartInst = null;

// ── HELPERS ──────────────────────────────────────────────────────────
function save() { localStorage.setItem('fintrack', JSON.stringify(state)); }
function fmt(n) { return '$' + (+n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function getMonths() {
  const set = new Set(state.transactions.map(t => t.date.slice(0,7)));
  return [...set].sort().reverse();
}

function inMonth(t, m) { return !m || t.date.startsWith(m); }

function calcTotals(month) {
  let income = 0, expenses = 0;
  for (const t of state.transactions) {
    if (!inMonth(t, month)) continue;
    if (t.type === 'income') income += +t.amount; else expenses += +t.amount;
  }
  return { income, expenses, net: income - expenses };
}

function breakdown(month) {
  const bd = {};
  for (const t of state.transactions) {
    if (!inMonth(t, month) || t.type !== 'expense') continue;
    bd[t.category] = (bd[t.category] || 0) + +t.amount;
  }
  return bd;
}

// ── MONTH SELECTOR ────────────────────────────────────────────────────
function buildMonthSelector() {
  const sel = document.getElementById('monthSelect');
  const months = getMonths();
  if (!months.includes(currentMonth)) currentMonth = months[0] || currentMonth;
  sel.innerHTML = months.map(m => `<option value="${m}" ${m===currentMonth?'selected':''}>${m}</option>`).join('');
  sel.onchange = () => { currentMonth = sel.value; renderAll(); };
}

// ── RENDER ALL ────────────────────────────────────────────────────────
function renderAll() {
  buildMonthSelector();
  renderDashboard();
  renderTransactions();
  renderAddForm();
  renderBudgets();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────
function renderDashboard() {
  const { income, expenses, net } = calcTotals(currentMonth);
  document.getElementById('kpi-income').textContent = fmt(income);
  document.getElementById('kpi-expense').textContent = fmt(expenses);
  const netEl = document.getElementById('kpi-net');
  netEl.textContent = fmt(net);
  netEl.className = 'kpi-value ' + (net >= 0 ? 'kpi-net-pos' : 'kpi-net-neg');

  const bd = breakdown(currentMonth);
  const labels = Object.keys(bd), values = Object.values(bd);

  // Pie
  const pieCanvas = document.getElementById('pieChart');
  const pieEmpty = document.getElementById('pieEmpty');
  if (labels.length === 0) {
    pieCanvas.style.display = 'none'; pieEmpty.style.display = 'block';
  } else {
    pieCanvas.style.display = ''; pieEmpty.style.display = 'none';
    if (pieChartInst) pieChartInst.destroy();
    pieChartInst = new Chart(pieCanvas, {
      type: 'doughnut',
      data: { labels, datasets: [{ data: values, backgroundColor: COLORS, borderColor: '#161616', borderWidth: 3 }] },
      options: { plugins: { legend: { position:'bottom', labels:{ color:'#888', font:{family:'DM Mono',size:11}, padding:12 }}},
        cutout: '55%', animation: { animateRotate: true } }
    });
  }

  // Bar
  const barCanvas = document.getElementById('barChart');
  const barEmpty = document.getElementById('barEmpty');
  if (labels.length === 0) {
    barCanvas.style.display = 'none'; barEmpty.style.display = 'block';
  } else {
    barCanvas.style.display = ''; barEmpty.style.display = 'none';
    if (barChartInst) barChartInst.destroy();
    barChartInst = new Chart(barCanvas, {
      type: 'bar',
      data: { labels, datasets: [{ data: values, backgroundColor: COLORS, borderRadius: 4 }] },
      options: { indexAxis:'y', plugins:{ legend:{display:false} },
        scales: { x:{ ticks:{color:'#555',font:{family:'DM Mono',size:11}}, grid:{color:'#1e1e1e'} },
                  y:{ ticks:{color:'#888',font:{family:'DM Mono',size:11}}, grid:{display:false} } } }
    });
  }

  // Budget warnings
  const bsEl = document.getElementById('budgetStatus');
  const warnings = Object.entries(state.budgets).map(([cat, budget]) => {
    const spent = bd[cat] || 0;
    const pct = Math.min(100, (spent/budget)*100);
    const level = spent >= budget ? 'exceeded' : spent >= 0.9*budget ? 'near' : 'ok';
    return { cat, spent, budget, pct, level };
  });
  if (warnings.length === 0) { bsEl.innerHTML = '<span style="color:var(--green);font-size:13px">✓ No budgets set yet</span>'; return; }
  const allOk = warnings.every(w => w.level === 'ok');
  let html = allOk ? '<div style="color:var(--green);font-size:13px;margin-bottom:12px">✓ All budgets on track</div>' : '';
  for (const w of warnings) {
    const color = w.level==='exceeded'?'var(--red)':w.level==='near'?'var(--yellow)':'var(--green)';
    const tag = w.level==='exceeded'?' ⚠ EXCEEDED':w.level==='near'?' ⚡ NEAR LIMIT':'';
    html += `<div class="budget-row">
      <span class="budget-cat">${w.cat}</span>
      <div class="budget-bar-wrap"><div class="budget-bar" style="width:${w.pct}%;background:${color}"></div></div>
      <span class="budget-nums" style="color:${color}">${fmt(w.spent)} / ${fmt(w.budget)}${tag}</span>
    </div>`;
  }
  bsEl.innerHTML = html;
}

// ── TRANSACTIONS ──────────────────────────────────────────────────────
function renderTransactions() {
  const filtered = state.transactions.filter(t => inMonth(t, currentMonth)).sort((a,b) => b.date.localeCompare(a.date));
  document.getElementById('txTitle').textContent = `TRANSACTIONS — ${currentMonth}`;
  document.getElementById('txCount').textContent = `${filtered.length} entries`;
  const el = document.getElementById('txList');
  if (filtered.length === 0) { el.innerHTML = '<div class="empty">No transactions this month</div>'; return; }
  el.innerHTML = filtered.map(t => `
    <div class="tx-row">
      <span class="tx-date">${t.date}</span>
      <span class="tx-badge"><span class="badge badge-${t.type}">${t.type.toUpperCase()}</span></span>
      <span class="tx-desc">${t.category}${t.note?`<span class="tx-note"> — ${t.note}</span>`:''}</span>
      <span class="tx-amount tx-amount-${t.type}">${t.type==='income'?'+':'−'}${fmt(+t.amount)}</span>
    </div>`).join('');
}

// ── ADD FORM ──────────────────────────────────────────────────────────
function renderAddForm() {
  const cats = state.categories[addType === 'income' ? 'income' : 'expense'];
  document.getElementById('addCategory').innerHTML = `<option value="">Select category...</option>` + cats.map(c=>`<option>${c}</option>`).join('');
  document.getElementById('btn-income').className = 'type-btn income' + (addType==='income'?' active':'');
  document.getElementById('btn-expense').className = 'type-btn expense' + (addType==='expense'?' active':'');
}

function setType(type) {
  addType = type;
  renderAddForm();
}

function addTransaction() {
  const cat = document.getElementById('addCategory').value;
  const amount = parseFloat(document.getElementById('addAmount').value);
  const date = document.getElementById('addDate').value;
  const note = document.getElementById('addNote').value.trim();
  if (!cat || !amount || !date || amount <= 0) return;
  state.transactions.push({ date, type: addType, category: cat, amount, note });
  save();
  document.getElementById('addAmount').value = '';
  document.getElementById('addNote').value = '';
  document.getElementById('addCategory').value = '';
  document.getElementById('addSuccess').textContent = '✓ Transaction added!';
  setTimeout(() => document.getElementById('addSuccess').textContent = '', 2500);
  renderAll();
}

// ── BUDGETS ───────────────────────────────────────────────────────────
function renderBudgets() {
  const bd = breakdown(currentMonth);
  document.getElementById('budgetCategory').innerHTML =
    `<option value="">Select category...</option>` + state.categories.expense.map(c=>`<option>${c}</option>`).join('');
  const el = document.getElementById('budgetItems');
  const entries = Object.entries(state.budgets);
  if (entries.length === 0) { el.innerHTML = '<div class="empty">No budgets set</div>'; return; }
  el.innerHTML = entries.map(([cat, budget]) => {
    const spent = bd[cat] || 0;
    const pct = Math.min(100, (spent/budget)*100);
    const color = pct >= 100 ? 'var(--red)' : pct >= 90 ? 'var(--yellow)' : 'var(--green)';
    return `<div class="budget-item">
      <div class="budget-item-top">
        <span class="budget-item-name">${cat}</span>
        <span style="font-size:12px;color:${color}">${fmt(spent)} / ${fmt(budget)}</span>
      </div>
      <div class="budget-item-bar"><div class="budget-item-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
  }).join('');
}

function setBudget() {
  const cat = document.getElementById('budgetCategory').value;
  const amount = parseFloat(document.getElementById('budgetAmount').value);
  if (!cat || !amount || amount <= 0) return;
  state.budgets[cat] = amount;
  save();
  document.getElementById('budgetAmount').value = '';
  document.getElementById('budgetCategory').value = '';
  document.getElementById('budgetSuccess').textContent = `✓ Budget set for ${cat}`;
  setTimeout(() => document.getElementById('budgetSuccess').textContent = '', 2500);
  renderAll();
}

// ── EXPORT CSV ────────────────────────────────────────────────────────
function exportCSV() {
  const rows = [['date','type','category','amount','note'], ...state.transactions.map(t=>[t.date,t.type,t.category,t.amount,t.note||''])];
  const csv = rows.map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'fintrack-transactions.csv';
  a.click();
}

// ── TABS ──────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  event.target.classList.add('active');
}

// ── INIT ──────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('addDate').value = new Date().toISOString().slice(0,10);
  renderAll();
});
</script>
</body>
